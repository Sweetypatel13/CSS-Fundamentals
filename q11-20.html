<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>q11-20</title>
</head>
<body>
    <h2>Q11 Inline</h2>
    <div class="inline-span">
      <span>Span 1</span>
      <span>Span 2</span>

    <h2>Q12 Block</h2>
    <div class="block-div">
      <div class="block1"></div>
      <div class="block2"></div>
    </div>
  
    <h2>Q13 Inline-Block</h2>
    <div class="inline-block">
      <div></div>
      <div></div>
      <div></div>
    </div>
  
    <h2>Q14 Hide</h2>
    <p class="none">This is display none</p>
    <p class="hidden">This is visibility hidden</p>
  
    <h2>Q15 RGBA</h2>
    <div class="rgba-box"></div>

    <div class="opacity-container">
      <div class="box1"></div>
      <div class="box2"></div>
      <div class="box3"></div>
    </div>
  
    <h2>Q17 Percentage</h2>
    <div class="parent">
      <div class="child"></div>
    </div>
  
    <h2>Q18 em</h2>
    <div class="em-box">This uses em padding</div>
  
    <h2>Q19 rem</h2>
    <p class="rem-text">This uses rem font size</p>
  
    <h2>Q20 Background Image</h2>
    <div class="bg-image"></div>
