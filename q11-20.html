<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>q11-20</title>
    <style>
        body {
          font-family: Arial, sans-serif;
          background-color: #f5f5f5;
          padding: 20px;
        }
    
        h2 {
          color: #333;
          margin-top: 30px;
        }
    
        /* Q11 Inline */
        .inline-span span {
          background-color: lightblue;
          width: 100px; /* won't work properly */
        }
    
        /* Q12 Block */
        .block-div div {
          width: 200px;
          height: 50px;
          margin: 5px 0;
        }
    
        .block1 { background-color: lightcoral; }
        .block2 { background-color: lightgreen; }
    
        /* Q13 Inline-block */
        .inline-block div {
          display: inline-block;
          width: 150px;
          height: 100px;
          margin: 10px;
          background-color: skyblue;
        }
    
        /* Q14 Hide */
        .none {
          display: none;
        }
    
        .hidden {
          visibility: hidden;
        }
    
        /* Q15 RGBA */
        .rgba-box {
          width: 200px;
          height: 200px;
          background-color: rgba(255, 0, 0, 0.5);
        }
    
        /* Q16 Opacity */
        .opacity-container div {
          width: 100px;
          height: 100px;
          display: inline-block;
          margin: 10px;
          opacity: 0.5;
        }
    
        .box1 { background: red; }
        .box2 { background: green; }
        .box3 { background: blue; }
    
        /* Q17 Percentage */
        .parent {
          width: 400px;
          background: #ddd;
          padding: 10px;
        }
    
        .child {
          width: 50%;
          height: 50px;
          background: purple;
        }
    
        /* Q18 em */
        .em-box {
          font-size: 20px;
          padding: 2em;
          background: peachpuff;
        }
    
        /* Q19 rem */
        html {
          font-size: 16px;
        }
    
        .rem-text {
          font-size: 2rem;
        }
    
        /* Q20 Background Image */
        .bg-image {
          height: 300px;
          background-image: url('https://iso.500px.com/wp-content/uploads/2019/07/stock-photo-maderas-312058103.jpg');
          background-size: cover;
          background-position: center;
          border-radius: 10px;
        }
    
      </style>
</head>
<body>
    <h2>Q11 Inline</h2>
    <div class="inline-span">
      <span>Span 1</span>
      <span>Span 2</span>
    </div>
  
    <h2>Q12 Block</h2>
    <div class="block-div">
      <div class="block1"></div>
      <div class="block2"></div>
    </div>
  
    <h2>Q13 Inline-Block</h2>
    <div class="inline-block">
      <div></div>
      <div></div>
      <div></div>
    </div>
  
    <h2>Q14 Hide</h2>
    <p class="none">This is display none</p>
    <p class="hidden">This is visibility hidden</p>
  
    <h2>Q15 RGBA</h2>
    <div class="rgba-box"></div>
  
    <h2>Q16 Opacity</h2>
    <div class="opacity-container">
      <div class="box1"></div>
      <div class="box2"></div>
      <div class="box3"></div>
    </div>
  
    <h2>Q17 Percentage</h2>
    <div class="parent">
      <div class="child"></div>
    </div>
  
    <h2>Q18 em</h2>
    <div class="em-box">This uses em padding</div>
  
    <h2>Q19 rem</h2>
    <p class="rem-text">This uses rem font size</p>
  
    <h2>Q20 Background Image</h2>
    <div class="bg-image"></div>  
</body>
</html>
